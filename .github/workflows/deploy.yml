name: Docker build -> push -> deploy

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@v4
      
    - name: Setup java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Build jar
      run: |
        chmod +x ./mvnw
        ./mvnw clean pakage -DskipTests
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/catalog-api:latest .

    - name: Push image to Docker Hub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/catalog-api:latest

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop catalog-api || true
          docker rm catalog-api || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/catalog-api:latest
          docker run -d --name catalog-api -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/catalog-api:latest
          
